version: "3.9"

services:
  vogunest-mongodb:
    image: mongo:7
    container_name: voguenest-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
networks:
  voguenest_network:
    external: true