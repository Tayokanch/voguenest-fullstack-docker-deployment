version: "3.9"

services:
  voguenest-mongodb:
    image: mongo:7
    container_name: voguenest-mongo
    restart: unless-stopped
    expose:
      - 27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    networks:
      - voguenest_network

  voguenest-api-1:
    build: ./VogueNest-API
    image: voguenest-api-1:latest
    restart: unless-stopped
    expose:
      - 3000
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@vogunest-mongodb:27017/${MONGO_DB}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASS: ${MONGO_PASS}
      MONGO_DB: ${MONGO_DB}
      MONGO_PORT: ${MONGO_PORT}
    depends_on:
      - voguenest-mongodb
    networks:
      - voguenest_network

  voguenest-api-2:
    build: ./VogueNest-API
    image: voguenest-api-2:latest
    restart: unless-stopped
    expose:
      - 3000
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@vogunest-mongodb:27017/${MONGO_DB}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASS: ${MONGO_PASS}
      MONGO_DB: ${MONGO_DB}
      MONGO_PORT: ${MONGO_PORT}
    depends_on:
      - voguenest-mongodb
    networks:
      - voguenest_network

  voguenest-api-3:
    build: ./VogueNest-API
    image: voguenest-api-3:latest
    restart: unless-stopped
    expose:
      - 3000
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@vogunest-mongodb:27017/${MONGO_DB}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASS: ${MONGO_PASS}
      MONGO_DB: ${MONGO_DB}
      MONGO_PORT: ${MONGO_PORT}
    depends_on:
      - voguenest-mongodb
    networks:
      - voguenest_network

  frontend:
    build: ./VogueNest-Frontend
    image: voguenest-frontend:latest
    container_name: voguenest-frontend
    restart: always
    expose:
      - "80"
    networks:
      - voguenest_network

volumes:
  mongo_data:

networks:
  voguenest_network:
    external: true